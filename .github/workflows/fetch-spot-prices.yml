name: Fetch day-ahead spot prices

on:
  schedule:
    - cron: "15 13 * * *"
  workflow_dispatch: {}

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch spot prices from RTE
        env:
          RTE_CLIENT_ID: ${{ secrets.RTE_CLIENT_ID }}
          RTE_CLIENT_SECRET: ${{ secrets.RTE_CLIENT_SECRET }}
        run: bash scripts/fetch-spot-prices.sh

      - name: Configure git identity
        run: git config user.name "github-actions[bot]" && git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push if changed
        run: 'git add data/spot-prices.json && (git diff --cached --quiet || (git commit -m "chore: update day-ahead spot prices" && git push))'
